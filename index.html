  <style>

    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 80px 20px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 50px;
      color: #60a5fa;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .links a {
      margin-right: 20px;
      font-weight: bold;
    }
  </style>
</head>

    </div>

    <div class="card">
